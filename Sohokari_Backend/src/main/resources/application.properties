spring.application.name=Sohokari_Backend

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI}}
spring.data.mongodb.database=sohokari

# JWT
app.jwt.secret=${JWT_SECRET:dev-local-jwt-secret-change-me}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Firebase
# Enable Firebase
app.firebase.enabled=true

# Environment
# Firebase
app.firebase.credentials-path=firebase-service-account.json
app.firebase.credentials-json=${FIREBASE_CREDENTIALS_JSON:}

# Spring AI → OpenRouter
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.chat.options.model=anthropic/claude-haiku-4-5
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=1000
