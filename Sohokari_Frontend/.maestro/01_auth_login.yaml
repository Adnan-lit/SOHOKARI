appId: com.adnan.sohokari
tags:
  - auth
  - smoke
---

# ══════════════════════════════════════════════════════════════
# TEST: Customer Login Flow
# ══════════════════════════════════════════════════════════════

- openLink: "exp+sohokari://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081"

# Dismiss dev menu if it appears (optional)
- tapOn:
    text: "Continue"
    optional: true

# Wait for login screen to fully load
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 60000

- takeScreenshot: screenshots/02_login_screen

# ── Test: Valid login ──────────────────────────────────

# Tap and type email - use the placeholder text
- tapOn: "you@example.com"
- inputText: "customer@test.com"

# Hide keyboard first, then tap password field
- hideKeyboard
- waitForAnimationToEnd

# Tap below the Password label on the actual input dots
- tapOn: "••••••••"
- inputText: "password123"

# Hide keyboard and tap Sign In
- hideKeyboard
- tapOn: "Sign In"

# Wait for response
- waitForAnimationToEnd

# Take screenshot of result
- takeScreenshot: screenshots/06_login_result
