appId: com.adnan.sohokari
tags:
  - generated
  - customer
  - booking
  - crud
---
- clearState
- launchApp
- waitForAnimationToEnd
- tapOn: "you@example.com"
- inputText: "customer@test.com"
- tapOn: "••••••••"
- inputText: "password123"
- tapOn: "Sign In"
- waitForAnimationToEnd:
    timeout: 15000
- takeScreenshot: generated/screenshots/05_01_home_before_booking

- tapOn:
    text: "Search services or providers…|Search"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Search by name, skill…"
    optional: true
- inputText: "electrician"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: generated/screenshots/05_02_provider_search

- tapOn:
    text: "Available Now|Currently Busy|Electrician|Plumber|Cleaner"
    optional: true
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible:
    text: "Provider Profile|Book This Provider|Ask a Query|Reviews|No results found"
    optional: true
- takeScreenshot: generated/screenshots/05_03_provider_profile_or_empty

- tapOn:
    text: "Book This Provider"
    optional: true
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible:
    text: "Confirm Booking|Scheduled Date|Service Address"
    optional: true
- takeScreenshot: generated/screenshots/05_04_create_booking

- tapOn:
    text: "Confirm Booking"
    optional: true
- assertVisible:
    text: "Select a date|Select a time slot|Address is required"
    optional: true
- takeScreenshot: generated/screenshots/05_05_booking_validation

- tapOn:
    text: "Select Date"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: generated/screenshots/05_06_date_picker
- tapOn:
    text: "20"
    optional: true
- tapOn:
    text: "Select time slot"
    optional: true
- tapOn:
    text: "10:00 AM"
    optional: true
- tapOn:
    text: "House 12, Road 5, Dhaka"
    optional: true
- inputText: "QA House 12, Road 5, Dhaka"
- tapOn:
    text: "Describe the problem briefly…"
    optional: true
- inputText: "Generated Maestro booking smoke test"
- takeScreenshot: generated/screenshots/05_07_booking_form_filled
- tapOn:
    text: "Confirm Booking"
    optional: true
- waitForAnimationToEnd:
    timeout: 15000
- assertVisible:
    text: "Booking Details|Booking failed|Select a date|REQUESTED"
    optional: true
- takeScreenshot: generated/screenshots/05_08_booking_submit_result
