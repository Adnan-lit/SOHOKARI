- launchApp
- waitForAnimationToEnd

- setAirplaneMode:
    value: true
- tapOn: "you@example.com"
- inputText: "customer@test.com"
- tapOn: "••••••••"
- inputText: "password123"
- tapOn: "Sign In"
- waitForAnimationToEnd:
    timeout: 15000
- assertVisible:
    text: "Login failed|Network Error|Welcome back|Sign In"
    optional: true
- takeScreenshot: generated/screenshots/10_01_offline_login

- setAirplaneMode:
    value: false
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: generated/screenshots/10_02_connectivity_restored

- clearState
- launchApp
- waitForAnimationToEnd
- tapOn: "you@example.com"
